spring.application.name=date-app
# MySQL 연결 설정 (지금은 실제 DB가 없으니 연결 시도를 무시하도록 설정합니다)
spring.application.name=date-app
spring.datasource.url=jdbc:mysql://localhost:3306/dateapp?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 아직 DB가 없어도 서버가 켜지게 만드는 마법의 옵션
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
