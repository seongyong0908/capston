<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>우리 팀 데이트 앱 - 내 위치 지도 📍</title>
    <style>
        /* 1. 화면 전체를 여백 없이 사용 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        /* 2. 지도를 화면 높이에 꽉 채우기 */
        #map {
            height: 100%;
            width: 100%;
        }

        /* 3. 제목을 지도 위에 둥둥 띄우기 */
        .map-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: 'Malgun Gothic', sans-serif;
            font-weight: bold;
            pointer-events: none; /* 제목 뒤의 지도 클릭 가능 */
        }
    </style>
</head>
<body>

    <div class="map-title">📍 내 주변 데이트 코스 찾기</div>
    <div id="map"></div>

    <script th:inline="javascript">
    let map;

    function initMap() {
        // 1. 일단 서울시청을 보여주며 지도를 띄웁니다.
        const defaultPos = { lat: 37.5665, lng: 126.9780 };
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 15,
            center: defaultPos,
            mapTypeControl: false,
        });

        // 2. 브라우저에게 실시간으로 내 위치를 물어봅니다.
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const myPos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                    };

                    console.log("위치 찾기 성공!", myPos);

                    // ★ 핵심: 내 위치를 찾으면 그곳으로 지도를 부드럽게 이동시킵니다.
                    map.panTo(myPos); 
                    map.setCenter(myPos);

                    // 내 위치에 마커 꽂기
                    new google.maps.Marker({
                        position: myPos,
                        map: map,
                        title: "현재 내 위치",
                        animation: google.maps.Animation.BOUNCE // 찾았다는 표시로 통통 튀게!
                    });
                },
                (error) => {
                    console.error("위치 획득 실패:", error.message);
                    alert("위치 정보를 가져올 수 없습니다. 권한 설정을 확인해주세요.");
                },
                {
                    enableHighAccuracy: true, // 정확도 높이기
                    timeout: 5000,           // 5초 안에 못 찾으면 에러 처리
                    maximumAge: 0
                }
            );
        }
    }
</script>

    <!-- 구글 맵 API 로드 (apiKey는 서버에서 받아옴) -->
    <script th:src="'https://maps.googleapis.com/maps/api/js?key=' + ${apiKey} + '&callback=initMap'" async defer></script>
</body>
</html>
