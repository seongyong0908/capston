<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>데이트 코스 지도 📍</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { height: 100%; width: 100%; }
        .map-title {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: white; padding: 10px 20px;
            border-radius: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            font-family: sans-serif; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="map-title">📍 내 주변 데이트 코스 찾기</div>
    <div id="map"></div>

    <script th:inline="javascript">
        let map;
        // VS Code 오류 방지용 타임리프 주석 문법 적용 완료
        const dbPlaces = /*[[${places}]]*/ []; 

        function initMap() {
            // 1. 초기 지도를 서울 중심으로 생성
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: { lat: 37.5665, lng: 126.9780 }
            });

            // 2. DB에서 가져온 장소들에 빨간색 마커 찍기
            if (dbPlaces && dbPlaces.length > 0) {
                dbPlaces.forEach(place => {
                    new google.maps.Marker({
                        position: { lat: place.latitude, lng: place.longitude },
                        map: map,
                        title: place.place_name,
                        icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
                    });
                });
            }

            // 3. 실시간 내 위치 찾아서 파란색 마커 찍기
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    map.setCenter(myPos); // 내 위치로 화면 이동
                    new google.maps.Marker({
                        position: myPos,
                        map: map,
                        title: "내 위치",
                        icon: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                        animation: google.maps.Animation.BOUNCE
                    });
                });
            }
        }
    </script>
    
    <!-- 컨트롤러에서 보내준 apiKey를 사용해서 구글 맵 호출 -->
    <script th:src="'https://maps.googleapis.com/maps/api/js?key=' + ${apiKey} + '&callback=initMap'" async defer></script>
</body>
</html>
